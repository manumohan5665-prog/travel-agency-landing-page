<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabook</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:ital,wght@0,200;0,300;0,400;0,500;0,600;0,700;1,200;1,300;1,400;1,500;1,600;1,700&family=Happy+Monkey&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <!-- NAVBAR SECTION -->
    <header>
        <nav class="navbar navbar-expand-lg bg-white py-1">

            <div class="container">

                <a class="navbar-brand" href="#">
                    <img src="./images/logo.png" alt="Logo" class="nav-logo">
                </a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarMenu">
                    <ul class="navbar-nav mx-auto">

                        <li class="nav-item">
                            <a class="nav-link active" href="#">Home</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link active" href="#">About</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link active" href="#">Destination</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link active" href="#">Tour</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link active" href="#">Blog</a>
                        </li>
                    </ul>

                    <div class="d-flex align-items-center">

                        <a href="#" class="btn text-decoration-none me-3" style="color: #F86925;">
                            Login
                        </a>

                        <button class="btn explore-btn px-4 shadow">Sign Up</button>

                    </div>

                </div>

            </div>

        </nav>
    </header>

    <main>
        <!-- HERO SECTION -->
        <section class="hero-section" id="hero">
            <div class="container">

                <div class="row align-items-center">

                    <div class="col-lg-6">

                        <h1 class="hero-heading">Get started your exciting <span style="color: #F86925;">journey
                            </span>with us.</h1>
                        <p class="hero-description">A Team of experienced tourism professionals will provide you with
                            the best advice and tips for your desire place.</p>
                        <button class="hero-button bg-white rounded mt-5 px-3 py-2 shadow-sm">Discover Now</button>
                    </div>

                    <div class="col-lg-6">
                        <img src="./images/hero-image.png"
                            alt="an image of a man sitting and reading a travel guide with his travel bag near to him"
                            class="hero-img img-fluid ">
                    </div>

                </div>

            </div>
        </section>

        <!-- SEARCH SECTION -->
        <section  class="search-section " id="search">

            <div class="container mt-5">

                <div class="search-box shadow-lg">

                    <div class="row align-items-center g-4">

                        <div class="search-item col-lg-3">
                            <label>
                                Location
                                <i class="bi bi-chevron-down"></i>
                            </label>
                            <p>Where are you going?</p>
                        </div>

                        <div class="search-item col-lg-3">
                            <label>
                                Date
                                <i class="bi bi-chevron-down"></i>
                            </label>
                            <p>When will you go?</p>
                        </div>

                        <div class="search-item col-lg-3">
                            <label>
                                Guest
                                <i class="bi bi-chevron-down"></i>
                            </label>
                            <p>Number of guest</p>
                        </div>

                        <div class="search-item col-lg-3">
                            <button class="btn explore-btn shadow">Explore Now</button>
                        </div>
                    </div>
                </div>

            </div>
        </section>

        <section id="todo">

        </section>

        <section id="deals">

        </section>

        <section id="vacation">

        </section>

        <section id="testimonial">

        </section>

        <section id="blog">

        </section>

        <section id="subscribe">

        </section>

    </main>

    <footer>

    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
